<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ChutGPT</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
}

body {
  background: #0f0f0f;
  color: white;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Conversation area */
.conversation {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

.message {
  margin-bottom: 15px;
  display: flex;
  justify-content: flex-end;
}

.bubble {
  background: #2a2a2a;
  padding: 12px 16px;
  border-radius: 16px;
  max-width: 80%;
  font-size: 15px;
}

/* INPUT WRAPPER */
.input-wrapper {
  padding: 16px;
  display: flex;
  justify-content: center;
  background: #0f0f0f;
}

/* Pill Bar */
.input-bar {
  width: 100%;
  max-width: 900px;
  display: flex;
  align-items: center;
  gap: 12px;

  padding: 10px 14px;
  border-radius: 40px;

  background: linear-gradient(
    180deg,
    rgba(40,40,40,0.95),
    rgba(25,25,25,0.95)
  );

  border: 1px solid rgba(255,255,255,0.08);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.05),
    0 8px 30px rgba(0,0,0,0.6);
}

/* Input */
.input-bar input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: white;
  font-size: 18px;
  padding: 8px 4px;
}

/* Icon Buttons */
.icon-btn {
  background: transparent;
  border: none;
  color: #b5b5b5;
  font-size: 22px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.icon-btn:hover {
  color: white;
}

/* Send Button */
.send-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: none;
  background: white;
  color: black;
  font-size: 20px;
  font-weight: bold;
  cursor: pointer;

  display: flex;
  align-items: center;
  justify-content: center;

  transition: 0.2s ease;
}

.send-btn:active {
  transform: scale(0.95);
}

/* MOBILE RESPONSIVE */
@media (max-width: 600px) {

  .input-wrapper {
    padding: 12px;
  }

  .input-bar {
    border-radius: 30px;
    padding: 8px 12px;
  }

  .input-bar input {
    font-size: 16px;
  }

  .send-btn {
    width: 40px;
    height: 40px;
    font-size: 18px;
  }
}

</style>
</head>
<body>

<div class="conversation" id="conversation"></div>

<div class="input-wrapper">
  <div class="input-bar">

    <button class="icon-btn">+</button>

    <input type="text" id="input" placeholder="Message ChutGPT..." />

    <button class="icon-btn">🎤</button>

    <button class="send-btn" onclick="sendMessage()">↑</button>

  </div>
</div>

<script>
let messageCount = 0;
const audioPath = "chodu-cid-chut.mp3";

const input = document.getElementById("input");
const conversation = document.getElementById("conversation");

input.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    sendMessage();
  }
});

function sendMessage() {
  const text = input.value.trim();
  if (!text) return;

  messageCount++;

  const message = document.createElement("div");
  message.classList.add("message");

  const bubble = document.createElement("div");
  bubble.classList.add("bubble");
  bubble.textContent = text;

  message.appendChild(bubble);
  conversation.appendChild(message);

  conversation.scrollTop = conversation.scrollHeight;

  playAudioMultipleTimes(messageCount);

  input.value = "";
}

function playAudioMultipleTimes(times) {
  let count = 0;

  function playAgain() {
    if (count < times) {
      const audio = new Audio(audioPath);
      audio.play();
      count++;
      audio.onended = playAgain;
    }
  }

  playAgain();
}
</script>

</body>
</html>
