<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ChutGPT</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
  background: #0f0f0f;
  color: #ececec;
  height: 100vh;
  display: flex;
}

/* Sidebar */
.sidebar {
  width: 260px;
  background: #171717;
  border-right: 1px solid #2a2a2a;
  padding: 14px;
  display: flex;
  flex-direction: column;
}

.new-btn {
  background: #2a2a2a;
  border: 1px solid #333;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  color: white;
  font-weight: 500;
  margin-bottom: 20px;
}
.new-btn:hover { background:#333; }

/* Main */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* Header */
.header {
  height: 56px;
  border-bottom: 1px solid #2a2a2a;
  display: flex;
  align-items: center;
  padding: 0 20px;
  font-weight: 600;
}

/* Conversation Area */
.conversation {
  flex: 1;
  overflow-y: auto;
  padding: 40px 20px;
  display: flex;
  justify-content: center;
}

.messages {
  width: 100%;
  max-width: 760px;
}

.message {
  display: flex;
  margin-bottom: 22px;
  animation: fadeIn 0.2s ease;
}

.message.user { justify-content: flex-end; }

.bubble {
  padding: 14px 18px;
  border-radius: 16px;
  font-size: 15px;
  line-height: 1.5;
  max-width: 75%;
}

.user .bubble { background:#2a2a2a; }
.bot .bubble { background:#1e1e1e; }

@keyframes fadeIn {
  from { opacity:0; transform:translateY(5px); }
  to { opacity:1; transform:translateY(0); }
}

/* Input */
.input-area {
  padding: 18px;
  border-top: 1px solid #2a2a2a;
  display: flex;
  justify-content: center;
}

.input-container {
  width: 100%;
  max-width: 760px;
  background:#1e1e1e;
  border-radius: 14px;
  display: flex;
  align-items: flex-end;
  padding: 10px;
}

textarea {
  flex:1;
  background:transparent;
  border:none;
  outline:none;
  resize:none;
  color:white;
  font-size:15px;
  line-height:1.5;
  max-height:120px;
  padding:8px;
}

.send-btn {
  background:#ffff;
  border:none;
  padding:8px 14px;
  border-radius:10px;
  font-weight:600;
  cursor:pointer;
}

.send-btn:hover { opacity:0.9; }

::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-thumb { background:#2a2a2a; border-radius:10px; }

.welcome {
  text-align:center;
  margin-top:80px;
  opacity:0.7;
  font-size:22px;
}
</style>
</head>
<body>

<div class="sidebar">
  <button class="new-btn">+ New Chut</button>
  <div style="opacity:0.6;font-size:13px;">Recent Chuts</div>
</div>

<div class="main">
  <div class="header">ChutGPT 69o</div>

  <div class="conversation" id="conversation">
    <div class="messages" id="messages">
      <div class="welcome">How can ChutGPT help you today?</div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-container">
      <textarea id="input" rows="1" placeholder="Message ChutGPT..."></textarea>
      <button class="send-btn" onclick="sendMessage()">↑</button>
    </div>
  </div>
</div>

<script>
let messageCount = 0;
const audioPath = "sound.mp3";

/* Auto-grow textarea */
const textarea = document.getElementById("input");
textarea.addEventListener("input", () => {
  textarea.style.height = "auto";
  textarea.style.height = textarea.scrollHeight + "px";
});

/* Send on Enter */
textarea.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

function sendMessage() {
  const text = textarea.value.trim();
  if (!text) return;

  messageCount++;

  const messages = document.getElementById("messages");
  document.querySelector(".welcome")?.remove();

  const messageDiv = document.createElement("div");
  messageDiv.classList.add("message","user");

  const bubble = document.createElement("div");
  bubble.classList.add("bubble");
  bubble.textContent = text;

  messageDiv.appendChild(bubble);
  messages.appendChild(messageDiv);

  document.getElementById("conversation").scrollTop =
    document.getElementById("conversation").scrollHeight;

  playAudioMultipleTimes(messageCount);

  textarea.value = "";
  textarea.style.height = "auto";
}

function playAudioMultipleTimes(times) {
  let count = 0;
  function playAgain() {
    if (count < times) {
      const audio = new Audio(audioPath);
      audio.play();
      count++;
      audio.onended = playAgain;
    }
  }
  playAgain();
}
</script>

</body>
</html>
